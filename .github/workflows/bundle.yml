name: Bundle

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read

env:
  DX_VERSION: "0.7.9"
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: assets/package-lock.json

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ runner.os }}-${{ env.DX_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            windows-cargo-${{ runner.os }}-${{ env.DX_VERSION }}-
            windows-cargo-${{ runner.os }}-

      - name: Install Windows bundling tools
        shell: pwsh
        run: |
          choco install wixtoolset llvm ninja --no-progress -y
          choco install cmake --version=3.31.8 --allow-downgrade --no-progress -y

      - name: Configure native build tools
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          $cmakeBin = "C:\Program Files\CMake\bin"
          if (Test-Path $llvmBin) {
            "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Append
            "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          if (Test-Path $cmakeBin) {
            "$cmakeBin" | Out-File -FilePath $env:GITHUB_PATH -Append
          }
          $cmakeGenerator = "Ninja"
          "CMAKE_GENERATOR=$cmakeGenerator" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_C_COMPILER=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_CXX_COMPILER=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          cmake --version
          ninja --version
          Write-Host "CMAKE_GENERATOR=$cmakeGenerator"

      - name: Install Dioxus CLI
        shell: pwsh
        run: |
          if (Get-Command dx -ErrorAction SilentlyContinue) {
            $dxVersion = dx --version
            Write-Host "Found cached Dioxus CLI: $dxVersion"
            if ($dxVersion -match [regex]::Escape($env:DX_VERSION)) {
              Write-Host "Dioxus CLI $env:DX_VERSION is already installed."
              exit 0
            }
          }

          cargo install dioxus-cli --version $env:DX_VERSION --locked --force

      - name: Generate CSS
        shell: pwsh
        working-directory: assets
        run: |
          npm ci
          npx @tailwindcss/cli -i tailwind.css -o tailwind_output.css

      - name: Build Windows app
        shell: pwsh
        run: >
          cargo build
          --release
          --no-default-features
          --features desktop
          --locked
          -p wifi-party-rust
          --bin wifi-party-rust
          --verbose

      - name: Bundle MSI
        shell: pwsh
        run: >
          dx bundle
          --windows
          --package-types msi
          --out-dir dist/windows
          --release
          --no-default-features
          --features desktop
          --locked
          --verbose

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: dist/windows/*.msi
          if-no-files-found: error

  macos:
    name: macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://nix-binary-cache.ken.com.im/ken https://nix-binary-cache.ken.com.im/wifi-party
            extra-trusted-public-keys = ken.com.im:br/oG6ywHr+tGvmUpZEA5mVYSNZgrNrFflazAEI+AK4= wifi-party:H2KMuBabLl9WHuBWw0cgXmYDdt82K7a1gmuvfKU9shY=

      - name: Bundle DMG
        run: |
          mkdir -p dist/macos
          nix build .#macos-dmg --out-link result-macos-dmg
          cp -L result-macos-dmg/*.dmg dist/macos/

      - name: Push to Nix binary cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          if [ -z "${ATTIC_TOKEN}" ]; then
            echo "ATTIC_TOKEN is not set; skip Nix cache push."
            exit 0
          fi

          nix shell nixpkgs#attic-client -c attic login --set-default wifi-party https://nix-binary-cache.ken.com.im/ "${ATTIC_TOKEN}"
          nix shell nixpkgs#attic-client -c attic push wifi-party:wifi-party result-macos-dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/macos/*.dmg
          if-no-files-found: error

  ios:
    name: iOS TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://nix-binary-cache.ken.com.im/ken https://nix-binary-cache.ken.com.im/wifi-party
            extra-trusted-public-keys = ken.com.im:br/oG6ywHr+tGvmUpZEA5mVYSNZgrNrFflazAEI+AK4= wifi-party:H2KMuBabLl9WHuBWw0cgXmYDdt82K7a1gmuvfKU9shY=

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version | grep -E '^26\.'

      - name: Build iOS app
        run: |
          mkdir -p dist/ios
          nix build .#ios-app --out-link result-ios-app
          cp -R result-ios-app/*.app dist/ios/
          chmod -R u+w dist/ios/*.app

      - name: Push to Nix binary cache
        continue-on-error: true
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          if [ -z "${ATTIC_TOKEN}" ]; then
            echo "ATTIC_TOKEN is not set; skip Nix cache push."
            exit 0
          fi

          nix shell nixpkgs#attic-client -c attic login --set-default wifi-party https://nix-binary-cache.ken.com.im/ "${ATTIC_TOKEN}"
          nix shell nixpkgs#attic-client -c attic push wifi-party:wifi-party result-ios-app

      - name: Package and upload TestFlight IPA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          required=(
            IOS_DISTRIBUTION_CERTIFICATE_BASE64
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            APP_STORE_CONNECT_API_KEY_ID
            APP_STORE_CONNECT_API_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "${name} is not set; cannot upload to TestFlight."
              exit 1
            fi
          done

          signing_dir="${RUNNER_TEMP}/ios-signing"
          keychain_path="${signing_dir}/app-signing.keychain-db"
          mkdir -p "${signing_dir}" "${HOME}/private_keys"

          echo "${IOS_DISTRIBUTION_CERTIFICATE_BASE64}" | base64 --decode > "${signing_dir}/certificate.p12"
          echo "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${signing_dir}/profile.mobileprovision"
          echo "${APP_STORE_CONNECT_API_KEY_BASE64}" | base64 --decode > "${HOME}/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          security create-keychain -p "" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "" "${keychain_path}"
          security import "${signing_dir}/certificate.p12" -k "${keychain_path}" -P "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security list-keychain -d user -s "${keychain_path}" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "${keychain_path}"

          security cms -D -i "${signing_dir}/profile.mobileprovision" > "${signing_dir}/profile.plist"
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" "${signing_dir}/profile.plist" > "${signing_dir}/entitlements.plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print :UUID" "${signing_dir}/profile.plist")
          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${signing_dir}/profile.mobileprovision" "${HOME}/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

          app_path=$(find dist/ios -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${app_path}" ]; then
            echo "No iOS .app found in dist/ios."
            exit 1
          fi

          iconset="${signing_dir}/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "${iconset}"
          sips -s format png assets/favicon.ico --out "${signing_dir}/AppIcon.png" >/dev/null
          sips -s format jpeg "${signing_dir}/AppIcon.png" --out "${signing_dir}/AppIconOpaque.jpg" >/dev/null
          sips -s format png "${signing_dir}/AppIconOpaque.jpg" --out "${signing_dir}/AppIconOpaque.png" >/dev/null
          for spec in \
            "40 Icon-20@2x.png" \
            "60 Icon-20@3x.png" \
            "58 Icon-29@2x.png" \
            "87 Icon-29@3x.png" \
            "80 Icon-40@2x.png" \
            "120 Icon-40@3x.png" \
            "120 Icon-60@2x.png" \
            "180 Icon-60@3x.png" \
            "1024 Icon-1024.png"; do
            set -- ${spec}
            sips -z "$1" "$1" "${signing_dir}/AppIconOpaque.png" --out "${iconset}/$2" >/dev/null
          done
          cp "${iconset}/Icon-60@2x.png" "${app_path}/Icon-60@2x.png"
          cp "${iconset}/Icon-60@3x.png" "${app_path}/Icon-60@3x.png"
          cat > "${iconset}/Contents.json" <<'JSON'
          {
            "images": [
              {"idiom":"iphone","size":"20x20","scale":"2x","filename":"Icon-20@2x.png"},
              {"idiom":"iphone","size":"20x20","scale":"3x","filename":"Icon-20@3x.png"},
              {"idiom":"iphone","size":"29x29","scale":"2x","filename":"Icon-29@2x.png"},
              {"idiom":"iphone","size":"29x29","scale":"3x","filename":"Icon-29@3x.png"},
              {"idiom":"iphone","size":"40x40","scale":"2x","filename":"Icon-40@2x.png"},
              {"idiom":"iphone","size":"40x40","scale":"3x","filename":"Icon-40@3x.png"},
              {"idiom":"iphone","size":"60x60","scale":"2x","filename":"Icon-60@2x.png"},
              {"idiom":"iphone","size":"60x60","scale":"3x","filename":"Icon-60@3x.png"},
              {"idiom":"ios-marketing","size":"1024x1024","scale":"1x","filename":"Icon-1024.png"}
            ],
            "info": {"author":"xcode","version":1}
          }
          JSON
          mkdir -p "${signing_dir}/assetcatalog"
          xcrun actool "${signing_dir}/Assets.xcassets" \
            --compile "${signing_dir}/assetcatalog" \
            --platform iphoneos \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-partial-info-plist "${signing_dir}/assetcatalog-info.plist"
          cp "${signing_dir}/assetcatalog/Assets.car" "${app_path}/Assets.car"

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 15.0" "${app_path}/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 15.0" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :DTPlatformName iphoneos" "${app_path}/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :DTPlatformName string iphoneos" "${app_path}/Info.plist"
          ios_sdk_version=$(xcrun --sdk iphoneos --show-sdk-version)
          /usr/libexec/PlistBuddy -c "Set :DTPlatformVersion ${ios_sdk_version}" "${app_path}/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :DTPlatformVersion string ${ios_sdk_version}" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :DTSDKName iphoneos${ios_sdk_version}" "${app_path}/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :DTSDKName string iphoneos${ios_sdk_version}" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleSupportedPlatforms" "${app_path}/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleSupportedPlatforms array" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleSupportedPlatforms:0 string iPhoneOS" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :UIRequiredDeviceCapabilities" "${app_path}/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiredDeviceCapabilities array" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIRequiredDeviceCapabilities:0 string arm64" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "${app_path}/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconFile" "${app_path}/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "${app_path}/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "${app_path}/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "${app_path}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string Icon-60" "${app_path}/Info.plist"
          cp "${signing_dir}/profile.mobileprovision" "${app_path}/embedded.mobileprovision"
          rm -f "${app_path}/CodeResources"

          identity=$(security find-identity -v -p codesigning "${keychain_path}" | sed -n 's/.*"\(Apple Distribution:.*\)".*/\1/p' | head -n 1)
          if [ -z "${identity}" ]; then
            echo "No Apple Distribution signing identity found in temporary keychain."
            security find-identity -v -p codesigning "${keychain_path}"
            exit 1
          fi

          while IFS= read -r item; do
            codesign --force --sign "${identity}" --entitlements "${signing_dir}/entitlements.plist" "${item}"
          done < <(find "${app_path}" \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) -print)

          codesign --force --sign "${identity}" --entitlements "${signing_dir}/entitlements.plist" "${app_path}"
          if [ ! -e "${app_path}/CodeResources" ]; then
            ln -s "_CodeSignature/CodeResources" "${app_path}/CodeResources"
          fi
          codesign --verify --deep --strict --verbose=2 "${app_path}"

          rm -rf "${signing_dir}/Payload"
          mkdir -p "${signing_dir}/Payload"
          cp -R "${app_path}" "${signing_dir}/Payload/"
          (cd "${signing_dir}" && ditto -c -k --sequesterRsrc --keepParent Payload "${GITHUB_WORKSPACE}/dist/ios/WifiPartyRust.ipa")

          xcrun altool --upload-app \
            --type ios \
            --file "${GITHUB_WORKSPACE}/dist/ios/WifiPartyRust.ipa" \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_API_ISSUER_ID}"

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-app
          path: dist/ios/*.app
          if-no-files-found: error

      - name: Upload iOS IPA artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: dist/ios/*.ipa
          if-no-files-found: error

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache
      # - name: Maximize build space
      #   uses: easimon/maximize-build-space@master
      #   with:
      #     root-reserve-mb: 512
      #     swap-size-mb: 1024
      #     remove-dotnet: "true"
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://nix-binary-cache.ken.com.im/ken https://nix-binary-cache.ken.com.im/wifi-party
            extra-trusted-public-keys = ken.com.im:br/oG6ywHr+tGvmUpZEA5mVYSNZgrNrFflazAEI+AK4= wifi-party:H2KMuBabLl9WHuBWw0cgXmYDdt82K7a1gmuvfKU9shY=

      - name: Bundle AppImage
        run: |
          mkdir -p dist/linux
          nix bundle --bundler .#appimage .#app --out-link result-appimage
          cp -L result-appimage dist/linux/wifi-party-rust.AppImage

      - name: Push to Nix binary cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          if [ -z "${ATTIC_TOKEN}" ]; then
            echo "ATTIC_TOKEN is not set; skip Nix cache push."
            exit 0
          fi

          nix shell nixpkgs#attic-client -c attic login --set-default wifi-party https://nix-binary-cache.ken.com.im/ "${ATTIC_TOKEN}"
          nix shell nixpkgs#attic-client -c attic push wifi-party:wifi-party result-appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: dist/linux/*.AppImage
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://nix-binary-cache.ken.com.im/ken https://nix-binary-cache.ken.com.im/wifi-party
            extra-trusted-public-keys = ken.com.im:br/oG6ywHr+tGvmUpZEA5mVYSNZgrNrFflazAEI+AK4= wifi-party:H2KMuBabLl9WHuBWw0cgXmYDdt82K7a1gmuvfKU9shY=

      - name: Bundle APK
        run: |
          mkdir -p dist/android
          nix build .#android-apk --out-link result-android-apk
          cp -L result-android-apk/*.apk dist/android/

      - name: Push to Nix binary cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          if [ -z "${ATTIC_TOKEN}" ]; then
            echo "ATTIC_TOKEN is not set; skip Nix cache push."
            exit 0
          fi

          nix shell nixpkgs#attic-client -c attic login --set-default wifi-party https://nix-binary-cache.ken.com.im/ "${ATTIC_TOKEN}"
          nix shell nixpkgs#attic-client -c attic push wifi-party:wifi-party result-android-apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dist/android/*.apk
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [windows, macos, ios, linux, android]
    if: >
      always()
      && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      actions: read
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download Windows MSI
        if: needs.windows.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${GITHUB_RUN_ID}" --name windows-msi --dir release-assets

      - name: Download macOS DMG
        if: needs.macos.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${GITHUB_RUN_ID}" --name macos-dmg --dir release-assets

      - name: Download Android APK
        if: needs.android.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${GITHUB_RUN_ID}" --name android-apk --dir release-assets

      - name: Download iOS IPA
        if: needs.ios.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${GITHUB_RUN_ID}" --name ios-ipa --dir release-assets

      - name: Download Linux AppImage
        if: needs.linux.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${GITHUB_RUN_ID}" --name linux-appimage --dir release-assets

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob globstar
          files=()
          for path in release-assets/**/*; do
            if [ -f "${path}" ]; then
              files+=("${path}")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${files[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${files[@]}" --title "${TAG_NAME}" --notes "Automated release for ${TAG_NAME}"
          fi
